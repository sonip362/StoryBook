<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bram Stoker's StoryBook - Entry Restricted</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="../dist/output.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1a0505 0%, #05050a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
        }
        .gate-card {
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(139, 0, 0, 0.4);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(139, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 3rem;
            border-radius: 2rem;
            text-align: center;
            position: relative;
        }
        .gate-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 2rem;
            background: linear-gradient(45deg, transparent, rgba(139, 0, 0, 0.3), transparent);
            z-index: -1;
            pointer-events: none;
        }
        .lock-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            color: #8b0000;
            text-shadow: 0 0 15px rgba(139, 0, 0, 0.6);
        }
        .secret-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(139, 0, 0, 0.5);
            border-radius: 0.75rem;
            padding: 1rem;
            color: #ffdbdb;
            font-family: 'Cinzel', serif;
            font-size: 1.25rem;
            text-align: center;
            letter-spacing: 0.3em;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 2rem;
        }
        .secret-input:focus {
            outline: none;
            border-color: #ff4d4d;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.4);
            transform: scale(1.02);
            background: rgba(20, 0, 0, 0.6);
        }
        .btn-enter {
            background: linear-gradient(135deg, #4a0404 0%, #8b0000 100%);
            color: #fff;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            padding: 1rem 2.5rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 120, 120, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .btn-enter:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(139, 0, 0, 0.5);
            filter: brightness(1.2);
        }
        .error-shake {
            animation: shake 0.4s ease-in-out;
            border-color: #ff0000 !important;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }
    </style>
</head>
<body>
    <div class="gate-card" id="gateCard">
        <div class="lock-icon">
            <i class="fas fa-eye"></i>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12 mx-auto mb-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
            </svg>
        </div>
        
        <h1 class="text-2xl font-bold mb-2 text-white" style="font-family: 'Cinzel', serif; letter-spacing: 0.1em; color: #ffdbdb;">
            Restricted Vault
        </h1>
        <p class="text-gray-400 mb-8 italic">Only those with the ancient cipher may enter...</p>
        
        <form id="gateForm">
            <input type="password" id="secretCode" class="secret-input" placeholder="••••" autocomplete="off" required>
            <button type="submit" class="btn-enter">
                Untether
            </button>
        </form>
        
        <p id="errorMsg" class="mt-4 text-red-500 opacity-0 transition-opacity duration-300 text-sm">The cipher is incorrect.</p>
    </div>

    <script>
        const gateForm = document.getElementById('gateForm');
        const secretInput = document.getElementById('secretCode');
        const gateCard = document.getElementById('gateCard');
        const errorMsg = document.getElementById('errorMsg');

        gateForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const code = secretInput.value;
            
            // The secret code is @#$%
            if (code === '@#$%') {
                sessionStorage.setItem('admin_access', 'granted_at_' + Date.now());
                window.location.href = 'admin.html';
            } else {
                gateCard.classList.add('error-shake');
                errorMsg.style.opacity = '1';
                secretInput.value = '';
                setTimeout(() => {
                    gateCard.classList.remove('error-shake');
                }, 400);
            }
        });
    </script>
</body>
</html>
